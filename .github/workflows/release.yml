name: Release

on:
  push:
    tags:
      - '*'

jobs:
  package-and-release:
    name: Package and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package module
        run: |
          echo "Packaging autoincoterms module ..."
          sudo apt-get update -q && sudo apt-get install -y -q zip
          mkdir artifacts
          cp LICENSE.md autoincoterms/LICENSE.md
          cp README.md autoincoterms/README.md
          cp CHANGELOG.md autoincoterms/ChangeLog.md
          zip -r "./artifacts/module_autoincoterms-${{ github.ref_name }}.zip" ./autoincoterms/
          echo "autoincoterms module packaged."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: Release created from CI/CD
          files: artifacts/module_autoincoterms-${{ github.ref_name }}.zip
